version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aipatterns-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  # ── CMS: MySQL + Strapi ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: aipatterns-mysql
    environment:
      MYSQL_ROOT_PASSWORD: strapiPassword123
      MYSQL_DATABASE: strapi_cms
      MYSQL_USER: strapi
      MYSQL_PASSWORD: strapiPassword123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "strapi", "--password=strapiPassword123"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./cms
      dockerfile: Dockerfile
      target: dev
    container_name: aipatterns-strapi
    environment:
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: strapi_cms
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapiPassword123
      DATABASE_SSL: "false"
      APP_KEYS: "localDevKey1,localDevKey2"
      API_TOKEN_SALT: "localDevApiTokenSalt"
      ADMIN_JWT_SECRET: "localDevAdminJwtSecret"
      TRANSFER_TOKEN_SALT: "localDevTransferTokenSalt"
      JWT_SECRET: "localDevJwtSecret"
      NODE_ENV: development
    ports:
      - "1337:1337"
    volumes:
      - ./cms:/app
      - /app/node_modules
      - strapi-uploads:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
    command: ["npm", "run", "develop"]

volumes:
  sqlserver-data:
  mysql-data:
  strapi-uploads:
