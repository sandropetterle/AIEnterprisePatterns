<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Circuit node center -->
  <circle cx="16" cy="16" r="3" fill="#6366f1"/>
  <!-- Circuit lines -->
  <line x1="16" y1="4" x2="16" y2="13" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="28" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="13" y2="16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="28" y2="16" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal lines -->
  <line x1="7.5" y1="7.5" x2="13.9" y2="13.9" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.1" y1="18.1" x2="24.5" y2="24.5" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24.5" y1="7.5" x2="18.1" y2="13.9" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.9" y1="18.1" x2="7.5" y2="24.5" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Corner nodes -->
  <circle cx="7" cy="7" r="1.5" fill="#818cf8"/>
  <circle cx="25" cy="7" r="1.5" fill="#818cf8"/>
  <circle cx="7" cy="25" r="1.5" fill="#818cf8"/>
  <circle cx="25" cy="25" r="1.5" fill="#818cf8"/>
  <!-- Axis nodes -->
  <circle cx="16" cy="4" r="1.5" fill="#a5b4fc"/>
  <circle cx="16" cy="28" r="1.5" fill="#a5b4fc"/>
  <circle cx="4" cy="16" r="1.5" fill="#a5b4fc"/>
  <circle cx="28" cy="16" r="1.5" fill="#a5b4fc"/>
</svg>
