# Lighthouse CI configuration for Phase 6.4 performance testing.
#
# CI usage (frontend-container-deploy.yml):
#   1. npm run build  (with NEXT_PUBLIC_API_BASE_URL set)
#   2. npm run start &
#   3. Wait for http://localhost:3000
#   4. npx lhci autorun
#
# Local usage:
#   npm run build && npm run start &
#   npx lhci autorun

ci:
  collect:
    url:
      - http://localhost:3000
      # /patterns omitted: LCP is dominated by live backend SSR fetch latency
      # which varies with CI runner load, making the 2500ms threshold unreliable.
      # Performance of the patterns listing is covered by E2E tests, not LHCI.
    numberOfRuns: 3
    # NOTE: do not add `warmupRuns` — it is not a real LHCI option and is
    # silently ignored (verified against @lhci/cli source, 2026-06-05).

  assert:
    assertions:
      # GitHub runners measure ~2.9-3.0s LCP medians for the home page — a
      # network-chain + layout floor under Lantern that page-level JS work
      # cannot lower (issue #71, Decisions 78/79). The LHCI default
      # aggregation (optimistic = best of 3) made the old 2500ms budget a
      # runner-speed lottery; median aggregation is stable run-to-run and
      # 3500ms still trips on any real regression (~15%+ above the floor).
      largest-contentful-paint:
        - error
        - maxNumericValue: 3500
          aggregationMethod: median
      first-contentful-paint:
        - error
        - maxNumericValue: 1800
      interactive:
        - error
        - maxNumericValue: 5000
      categories:performance:
        - error
        - minScore: 0.80
      categories:accessibility:
        - warn
        - minScore: 0.90

  upload:
    # Posts results to a temporary public URL (no token required).
    # Set LHCI_GITHUB_APP_TOKEN to also post a GitHub status check.
    target: temporary-public-storage
