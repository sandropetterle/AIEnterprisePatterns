name: CMS (Strapi) — Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'cms/**'
      - '.github/workflows/cms-container-deploy.yml'
  workflow_dispatch:

# Queue deploys — never cancel a deploy mid-flight
concurrency:
  group: deploy-cms-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_CONTAINER_APP: 'ca-aipatterns-cms-prod'
  RESOURCE_GROUP: 'rg-aipatterns-prod'
  CONTAINER_REGISTRY: 'craipatternssp54426'
  IMAGE_NAME: 'aipatterns-cms'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to Azure
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.CONTAINER_REGISTRY }}

      - name: Build Docker image
        working-directory: ./cms
        run: |
          docker build \
            --target production \
            -t ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Logout from Azure
        run: az logout
        if: always()

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: 'Production'
      url: https://${{ steps.get-url.outputs.fqdn }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "CMS URL: https://$FQDN"

      - name: Logout from Azure
        run: az logout
        if: always()

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: sleep 60

      - name: Check CMS health
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.get-url.outputs.fqdn }}/_health)
          if [ "$http_code" = "204" ] || [ "$http_code" = "200" ]; then
            echo "✓ CMS health check passed (HTTP $http_code)"
          else
            echo "✗ CMS health check failed (HTTP $http_code)"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "### CMS Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Strapi CMS:** https://${{ steps.get-url.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin Panel:** https://${{ steps.get-url.outputs.fqdn }}/admin" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Status:** ✓ Healthy" >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        run: az logout
        if: always()

  tag-latest:
    name: Tag as Latest
    runs-on: ubuntu-latest
    needs: healthcheck
    if: success()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Tag image as latest
        run: |
          az acr import \
            --name ${{ env.CONTAINER_REGISTRY }} \
            --source ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --force

      - name: Logout from Azure
        run: az logout
        if: always()

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [healthcheck, tag-latest]
    if: failure()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback to previous image
        run: |
          echo "Health check failed — rolling back CMS to previous latest image"
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Logout from Azure
        run: az logout
        if: always()
