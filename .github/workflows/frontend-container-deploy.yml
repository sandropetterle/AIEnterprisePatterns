name: Frontend Web - Build and Deploy (Container Apps)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - '.github/workflows/frontend-container-deploy.yml'
  workflow_dispatch:

env:
  AZURE_CONTAINER_APP: 'ca-aipatterns-web-prod'
  BACKEND_CONTAINER_APP: 'ca-aipatterns-api-prod'
  RESOURCE_GROUP: 'rg-aipatterns-prod'
  CONTAINER_REGISTRY: 'craipatternssp54426'
  IMAGE_NAME: 'aipatterns-frontend'

jobs:
  run-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --maxWorkers=2
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Backend URL
        id: get-backend-url
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "backend_url=https://$BACKEND_FQDN/api" >> $GITHUB_OUTPUT
          echo "Backend API URL: https://$BACKEND_FQDN/api"

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.CONTAINER_REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.get-backend-url.outputs.backend_url }} \
            -t ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Logout from Azure
        run: az logout
        if: always()

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: 'Production'
      url: https://${{ steps.get-url.outputs.fqdn }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Backend URL
        id: get-backend-url
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "backend_url=https://$BACKEND_FQDN/api" >> $GITHUB_OUTPUT

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "NEXT_PUBLIC_API_BASE_URL=${{ steps.get-backend-url.outputs.backend_url }}" \
              "AUTH_SECRET=secretref:auth-secret" \
              "AUTH_ENTRA_ISSUER=${{ secrets.AUTH_ENTRA_ISSUER }}" \
              "AUTH_ENTRA_CLIENT_ID=${{ secrets.AUTH_ENTRA_CLIENT_ID }}" \
              "AUTH_ENTRA_CLIENT_SECRET=secretref:auth-entra-client-secret" \
              "AUTH_API_SCOPE_READ=${{ secrets.AUTH_API_SCOPE_READ }}" \
              "AUTH_API_SCOPE_WRITE=${{ secrets.AUTH_API_SCOPE_WRITE }}" \
              "AUTH_TRUST_HOST=true"

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "Frontend URL: https://$FQDN"

      - name: Logout from Azure
        run: az logout
        if: always()

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: sleep 45

      - name: Check homepage
        run: |
          response=$(curl -s https://${{ steps.get-url.outputs.fqdn }})
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.get-url.outputs.fqdn }})

          # Check for Next.js HTML content (not Azure welcome page)
          if echo "$response" | grep -q "next-size-adjust"; then
            echo "✓ Homepage health check passed (HTTP $http_code, Next.js content detected)"
          else
            echo "✗ Homepage health check failed (HTTP $http_code)"
            echo "Response does not contain Next.js markers - may be showing Azure welcome page"
            echo "First 500 chars: ${response:0:500}"
            exit 1
          fi

      - name: Check patterns page
        run: |
          response=$(curl -s https://${{ steps.get-url.outputs.fqdn }}/patterns)
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.get-url.outputs.fqdn }}/patterns)

          # Check for Next.js HTML content (not Azure welcome page)
          if echo "$response" | grep -q "next-size-adjust"; then
            echo "✓ Patterns page accessible (HTTP $http_code, Next.js content detected)"
          else
            echo "✗ Patterns page not accessible (HTTP $http_code)"
            echo "Response does not contain Next.js markers - may be showing Azure welcome page"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Web:** https://${{ steps.get-url.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Patterns Page:** https://${{ steps.get-url.outputs.fqdn }}/patterns" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Status:** ✓ Healthy" >> $GITHUB_STEP_SUMMARY
          echo "- **Scaling:** Scale to zero when idle (cost-optimized)" >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        run: az logout
        if: always()

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: healthcheck
    if: failure()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback to previous image
        run: |
          echo "Health check failed - rolling back to previous 'latest' image"
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Logout from Azure
        run: az logout
        if: always()
