name: Frontend Web - Build and Deploy (Container Apps)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tailwind.config.ts'
      - 'lighthouserc.yml'
      - '.storybook/**'
      - '.github/workflows/frontend-container-deploy.yml'
  workflow_dispatch:

# Queue deploys — never cancel a deploy mid-flight
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_CONTAINER_APP: 'ca-aipatterns-web-prod'
  BACKEND_CONTAINER_APP: 'ca-aipatterns-api-prod'
  RESOURCE_GROUP: 'rg-aipatterns-prod'
  CONTAINER_REGISTRY: 'craipatternssp54426'
  IMAGE_NAME: 'aipatterns-frontend'

jobs:
  run-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm test -- --ci --maxWorkers=2
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Backend URL
        id: get-backend-url
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "backend_url=https://$BACKEND_FQDN/api" >> $GITHUB_OUTPUT
          echo "Backend API URL: https://$BACKEND_FQDN/api"

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ env.CONTAINER_REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ steps.get-backend-url.outputs.backend_url }} \
            -t ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Logout from Azure
        run: az logout
        if: always()

  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          # Use the production backend URL so SSR data fetches succeed.
          # Falls back gracefully (empty state) if the variable is not configured.
          # Set LHCI_API_BASE_URL as a repository variable (Settings → Secrets and variables → Actions → Variables).
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.LHCI_API_BASE_URL }}
          NEXT_PUBLIC_API_TIMEOUT: 30000
          # Auth.js v5 requires AUTH_SECRET at build time for server components.
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: true

      - name: Start frontend server
        run: |
          npm run start &
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          # Optional: posts results as a GitHub status check.
          # Add LHCI_GITHUB_APP_TOKEN to GitHub Secrets to enable.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  chromatic:
    name: Chromatic Visual Regression
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: read
    # Remove continue-on-error once CHROMATIC_PROJECT_TOKEN is configured
    # in GitHub Secrets (https://www.chromatic.com → project → manage).
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Chromatic requires full git history to establish baselines.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        # --exit-zero-on-changes: non-blocking on first run so a baseline can be
        # accepted in the Chromatic dashboard. Remove this flag once baseline is
        # approved to make visual regression a hard deploy gate.
        run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-zero-on-changes

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push, lhci, chromatic]
    environment:
      name: 'Production'
      url: https://${{ steps.get-url.outputs.fqdn }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Service URLs
        id: get-backend-url
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "backend_url=https://$BACKEND_FQDN/api" >> $GITHUB_OUTPUT

          FRONTEND_FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "auth_url=https://$FRONTEND_FQDN" >> $GITHUB_OUTPUT

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "NEXT_PUBLIC_API_BASE_URL=${{ steps.get-backend-url.outputs.backend_url }}" \
              "AUTH_SECRET=secretref:auth-secret" \
              "AUTH_ENTRA_ISSUER=${{ secrets.AUTH_ENTRA_ISSUER }}" \
              "AUTH_ENTRA_CLIENT_ID=${{ secrets.AUTH_ENTRA_CLIENT_ID }}" \
              "AUTH_ENTRA_CLIENT_SECRET=secretref:auth-entra-client-secret" \
              "AUTH_API_SCOPE_READ=${{ secrets.AUTH_API_SCOPE_READ }}" \
              "AUTH_API_SCOPE_WRITE=${{ secrets.AUTH_API_SCOPE_WRITE }}" \
              "AUTH_TRUST_HOST=true" \
              "AUTH_URL=${{ steps.get-backend-url.outputs.auth_url }}" \
              "REVALIDATE_SECRET=secretref:revalidate-secret"

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "Frontend URL: https://$FQDN"

      - name: Logout from Azure
        run: az logout
        if: always()

  healthcheck:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: sleep 45

      - name: Check homepage
        run: |
          response=$(curl -s https://${{ steps.get-url.outputs.fqdn }})
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.get-url.outputs.fqdn }})

          # Check for Next.js HTML content (not Azure welcome page)
          if echo "$response" | grep -q "next-size-adjust"; then
            echo "✓ Homepage health check passed (HTTP $http_code, Next.js content detected)"
          else
            echo "✗ Homepage health check failed (HTTP $http_code)"
            echo "Response does not contain Next.js markers - may be showing Azure welcome page"
            echo "First 500 chars: ${response:0:500}"
            exit 1
          fi

      - name: Check patterns page
        run: |
          response=$(curl -s https://${{ steps.get-url.outputs.fqdn }}/patterns)
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://${{ steps.get-url.outputs.fqdn }}/patterns)

          # Check for Next.js HTML content (not Azure welcome page)
          if echo "$response" | grep -q "next-size-adjust"; then
            echo "✓ Patterns page accessible (HTTP $http_code, Next.js content detected)"
          else
            echo "✗ Patterns page not accessible (HTTP $http_code)"
            echo "Response does not contain Next.js markers - may be showing Azure welcome page"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Web:** https://${{ steps.get-url.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Patterns Page:** https://${{ steps.get-url.outputs.fqdn }}/patterns" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Status:** ✓ Healthy" >> $GITHUB_STEP_SUMMARY
          echo "- **Scaling:** Scale to zero when idle (cost-optimized)" >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        run: az logout
        if: always()

  tag-latest:
    name: Tag as Latest
    runs-on: ubuntu-latest
    needs: healthcheck
    if: success()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Tag image as latest
        run: |
          az acr import \
            --name ${{ env.CONTAINER_REGISTRY }} \
            --source ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --force

      - name: Logout from Azure
        run: az logout
        if: always()

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [healthcheck, tag-latest]
    if: failure()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback to previous image
        run: |
          echo "Health check failed - rolling back to previous 'latest' image"
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Logout from Azure
        run: az logout
        if: always()
