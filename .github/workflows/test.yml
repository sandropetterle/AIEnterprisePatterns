name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Deny all permissions by default; each job grants only what it needs
permissions: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Security audit (NuGet vulnerabilities)
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults --settings coverlet.runsettings

      - name: Generate coverage report
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
        with:
          files: ./backend/TestResults/**/coverage.cobertura.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-results
          path: ./backend/TestResults

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000

      - name: Generate coverage report
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: ./coverage

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run E2E tests on main branch or when manually triggered
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      # Run all browsers even if one fails — provides full cross-browser picture
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Setup .NET for backend
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Build backend
        working-directory: ./backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Start backend server
        working-directory: ./backend
        run: |
          dotnet run --project src/AIEnterprisePatterns.Api --no-build --configuration Release &
          # Wait for backend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:5255/health; do sleep 2; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5255

      - name: Build frontend
        run: npm run build
        env:
          # NEXT_PUBLIC_* vars are baked into client bundles at build time.
          # They must be set here so VotingButton and other client components
          # call the correct API URL during E2E tests.
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000
          # Auth.js v5 calls auth() in server components — next build fails without this.
          AUTH_SECRET: test-secret-for-e2e
          AUTH_TRUST_HOST: true

      - name: Start frontend server
        run: |
          npm run start &
          # Wait for the Next.js server to be ready before running tests
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          # Auth.js needs these at runtime: AUTH_SECRET signs session cookies;
          # AUTH_ENTRA_* enables signIn() to construct the OIDC authorization URL.
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_ENTRA_ISSUER: ${{ secrets.AUTH_ENTRA_ISSUER }}
          AUTH_ENTRA_CLIENT_ID: ${{ secrets.AUTH_ENTRA_CLIENT_ID }}
          AUTH_ENTRA_CLIENT_SECRET: ${{ secrets.AUTH_ENTRA_CLIENT_SECRET }}
          AUTH_API_SCOPE_READ: ${{ secrets.AUTH_API_SCOPE_READ }}
          AUTH_API_SCOPE_WRITE: ${{ secrets.AUTH_API_SCOPE_WRITE }}
          AUTH_TRUST_HOST: true

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          # AUTH_SECRET is required: global.setup.ts uses it to create a synthetic
          # Auth.js session cookie (direct injection — no Entra browser login needed).
          # Authenticated UI tests always run when this is set.
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_ENTRA_ISSUER: ${{ secrets.AUTH_ENTRA_ISSUER }}
          AUTH_ENTRA_CLIENT_ID: ${{ secrets.AUTH_ENTRA_CLIENT_ID }}
          AUTH_ENTRA_CLIENT_SECRET: ${{ secrets.AUTH_ENTRA_CLIENT_SECRET }}
          AUTH_API_SCOPE_READ: ${{ secrets.AUTH_API_SCOPE_READ }}
          AUTH_API_SCOPE_WRITE: ${{ secrets.AUTH_API_SCOPE_WRITE }}
          AUTH_TRUST_HOST: true
          # E2E_API_WRITES=true enables the create/edit/delete API tests, which
          # require a real Entra access token in the session (not the placeholder
          # token created by direct injection). Leave unset for standard CI runs.
          # E2E_API_WRITES: true

      - name: Upload Playwright report (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload login diagnostic screenshots (${{ matrix.browser }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: login-diagnostic-screenshots-${{ matrix.browser }}
          path: e2e/.auth/*.png
          if-no-files-found: ignore
          retention-days: 7

  validate-infrastructure:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Azure CLI + Bicep
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az bicep install

      - name: Validate Bicep templates
        run: az bicep build --file infrastructure/main.bicep

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, validate-infrastructure, e2e-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          FAILED=false

          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "backend-tests: FAILED"
            FAILED=true
          fi

          if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "frontend-tests: FAILED"
            FAILED=true
          fi

          if [[ "${{ needs.validate-infrastructure.result }}" == "failure" ]]; then
            echo "validate-infrastructure: FAILED"
            FAILED=true
          fi

          # E2E: only fail if it ran AND failed (skipped = OK on PRs)
          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "e2e-tests: FAILED"
            FAILED=true
          elif [[ "${{ needs.e2e-tests.result }}" == "skipped" ]]; then
            echo "e2e-tests: SKIPPED (PR — main-only)"
          fi

          if [ "$FAILED" = true ]; then
            echo "One or more test suites failed"
            exit 1
          else
            echo "All test suites passed"
          fi
