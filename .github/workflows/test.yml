name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults --settings coverlet.runsettings

      - name: Generate coverage report
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/TestResults/**/coverage.cobertura.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./backend/TestResults

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000

      - name: Generate coverage report
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ./coverage

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E tests on main branch or when manually triggered
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup .NET for backend
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build backend
        working-directory: ./backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Start backend server
        working-directory: ./backend
        run: |
          dotnet run --project src/AIEnterprisePatterns.Api --no-build --configuration Release &
          # Wait for backend to be ready
          timeout 60 bash -c 'until curl -f http://localhost:5255/health; do sleep 2; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5255

      - name: Build frontend
        run: npm run build
        env:
          # NEXT_PUBLIC_* vars are baked into client bundles at build time.
          # They must be set here so VotingButton and other client components
          # call the correct API URL during E2E tests.
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          NEXT_PUBLIC_API_TIMEOUT: 30000
          # Auth.js v5 calls auth() in server components — next build fails without this.
          AUTH_SECRET: test-secret-for-e2e
          AUTH_TRUST_HOST: true

      - name: Start frontend server
        run: |
          npm run start &
          # Wait for the Next.js server to be ready before running tests
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          # Auth.js needs these at runtime: AUTH_SECRET signs session cookies;
          # AUTH_ENTRA_* enables signIn() to construct the OIDC authorization URL.
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_ENTRA_ISSUER: ${{ secrets.AUTH_ENTRA_ISSUER }}
          AUTH_ENTRA_CLIENT_ID: ${{ secrets.AUTH_ENTRA_CLIENT_ID }}
          AUTH_ENTRA_CLIENT_SECRET: ${{ secrets.AUTH_ENTRA_CLIENT_SECRET }}
          AUTH_API_SCOPE_READ: ${{ secrets.AUTH_API_SCOPE_READ }}
          AUTH_API_SCOPE_WRITE: ${{ secrets.AUTH_API_SCOPE_WRITE }}
          AUTH_TRUST_HOST: true

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5255/api
          # Auth.js env vars are needed for server components rendered during E2E tests
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_ENTRA_ISSUER: ${{ secrets.AUTH_ENTRA_ISSUER }}
          AUTH_ENTRA_CLIENT_ID: ${{ secrets.AUTH_ENTRA_CLIENT_ID }}
          AUTH_ENTRA_CLIENT_SECRET: ${{ secrets.AUTH_ENTRA_CLIENT_SECRET }}
          AUTH_API_SCOPE_READ: ${{ secrets.AUTH_API_SCOPE_READ }}
          AUTH_API_SCOPE_WRITE: ${{ secrets.AUTH_API_SCOPE_WRITE }}
          AUTH_TRUST_HOST: true
          # Admin credentials cover all authenticated tests (Admin has all Editor permissions)
          # Optional — authenticated tests are skipped when not set
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" || "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi
