version: 2
updates:
  # Frontend npm (root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      testing:
        patterns:
          - "jest"
          - "jest-environment-jsdom"
          - "@types/jest"
          - "@testing-library/*"
          - "jest-axe"
          - "@types/jest-axe"
          - "@playwright/test"
      types:
        patterns:
          - "@types/node"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # tailwindcss v4 is a breaking rewrite — defer to Phase 8
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # eslint v10 has breaking plugin changes — defer to Phase 8
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # next-auth v5 is intentionally on beta — don't auto-bump to v4 stable
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 is a major — defer to Phase 8 per Decision 35
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # lucide-react v1 dropped all brand icons (Github, LinkedIn, etc.) — see Decision 69
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]

  # CMS npm (cms/)
  - package-ecosystem: "npm"
    directory: "/cms"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      strapi:
        patterns:
          - "@strapi/*"
          - "strapi"
    ignore:
      # Strapi controls its React version — don't auto-bump
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Strapi controls react-router-dom — don't auto-bump
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 is a major — defer to Phase 8 per Decision 35
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # .NET NuGet (backend/)
  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      dotnet-servicing:
        patterns:
          - "Microsoft.*"
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      test-infrastructure:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"
          - "Moq"
    ignore:
      - dependency-name: "Microsoft.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "coverlet.*"
        update-types: ["version-update:semver-major"]
      # Swashbuckle v10 is a major — defer per Decision 35
      - dependency-name: "Swashbuckle.AspNetCore"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  # Docker — frontend
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # Node 25 is odd-numbered STS (non-LTS); target is Node 22 LTS when ready
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # Docker — backend
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    ignore:
      # .NET 8 LTS runs until Nov 2026; .NET 10 migration is its own project
      - dependency-name: "mcr.microsoft.com/dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/aspnet"
        update-types: ["version-update:semver-major"]

  # Docker — CMS
  - package-ecosystem: "docker"
    directory: "/cms"
    schedule:
      interval: "monthly"
    ignore:
      # Node 25 is odd-numbered STS (non-LTS); target is Node 22 LTS when ready
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
